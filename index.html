<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encriptador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="logo">a</h1>
    </header>
    <main>
        <section class="encriptador">
            <textarea id="input-text" class="texto-area" placeholder="Ingrese el texto aquí"></textarea>
            <div class="botones">
                <div class="exclamacion">
                    <img src="exclamacion.png" alt="Signo exclamación">
                    Solo letras minúsculas y sin acentos
                </div>
                <button id="encriptar" class="boton encriptar">Encriptar</button>
                <button id="desencriptar" class="boton desencriptar">Desencriptar</button>
            </div>
        </section>
        <section class="resultado">
            <div class="resultado-contenido">
                <img id="imagen-resultado" src="imagen1.png" alt="Imagen resultado" class="imagen-resultado">
                <p id="mensaje-resultado" class="mensaje-resultado">Ningún mensaje fue encontrado</p>
                <p id="mensaje-subtitulo" class="mensaje-subtitulo">Ingresa el texto que desees encriptar o desencriptar.</p>
                <button id="copiar" class="boton copiar">Copiar</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
